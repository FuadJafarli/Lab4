<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <title>Tapşırıq 3</title>
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: white;
    }

    .red-box {
      background-color: red;
      width: 500px;
      height: 500px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      padding-right: 10px;
    }

    .blue-square {
      background-color: blue;
      width: 80px;
      height: 80px;
    }
  </style>
</head>
<body>
  <div class="red-box">
    <div class="blue-square"></div>
    <div class="blue-square"></div>
    <div class="blue-square"></div>
    <div class="blue-square"></div>
  </div>
</body>
</html>
